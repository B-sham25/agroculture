/* background-color */

body{font-family: 'Inter', sans-serif;

.backgroundnav{background-color: #8cf501;
  top:0;
  z-index: 1030; }


/* Targeting the Nav Links */
.backgroundnav .nav-link {
    color: #462b0d !important; /* Forces your cream color */
    transition: color 0.3s ease;
}
.backgroundnav .nav-link {
  position: relative;       /* needed for ::before positioning */
  padding: 0.5em 1em;      /* adjust spacing */
  transition: color 0.5s ease;
}

.backgroundnav .nav-link::before {
  content: "";
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  height: 80%;
  background-color: green; /* your green */
  border-radius:  0px 10px;       /* rounded corners */
  z-index: -1;               /* behind the text */
  opacity: 0;                /* hidden by default */
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.backgroundnav .nav-link:hover::before {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1.1); /* slightly enlarge on hover */
}

/* The Hover Effect */
.backgroundnav .nav-link:hover {
    color: #e6f7ce !important; /* Or #ffca28 for a warmer gold */
}

/* Making the SVG icons inherit the color change */
.backgroundnav .nav-link svg {
    fill: currentColor;
}
.video-thumb {
  position: relative;
  cursor: pointer;
}

.video-thumb::after {
  content: "▶";
  font-size: 40px;
  color: white;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

</style>
</head>

<script>
  const videos = document.querySelectorAll('.video-thumb');

  videos.forEach(video => {
    video.addEventListener('mouseenter', () => {
      video.play();
    });

    video.addEventListener('mouseleave', () => {
      video.pause();
      video.currentTime = 0; // reset to start
    });
  });
